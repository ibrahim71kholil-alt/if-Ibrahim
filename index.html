<!DOCTYPE html>
<html>
<head>
  <title>Ibrahim Website</title>

  <style>
    body{

      color:white;
      font-family:Arial;

    }

    header{
      background:#000;
      padding:20px;
      text-align:center;
      font-size:28px;

    .post{

      margin:20px;
      padding:15px;

    img{
      width:100%;
      border-radius:10px;
    }

    video{
      width:100%;
      border-radius:10px;
    }

    h2{
      color:#00ffcc;
    }
  </style>
</head>

<body>

<header>
  Ibrahim News Website
</header>

<div class="post">
  <h2>SSC Exam Notice</h2>

  <p>
    আগামী ২ জুন ২০২৭ SSC পরীক্ষা শুরু হবে।
  </p>
</div>

<div class="post">
  <h2>New Photo</h2>

  <img src="https://picsum.photos/500/300">

</div>

<div class="post">
  <h2>New Video</h2>

  <video controls>
    <source src="movie.mp4" type="video/mp4">
  </video>
</div>

</body>
</html>
